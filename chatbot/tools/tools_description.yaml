BluePrint:
  multiply:
    'type': function,
    'function':
      'name': 'multiply'
      'description': 'A function that multiplies two numbers'
      'parameters':
        'type': 'object'
        'required': ['a', 'b']
        'properties': 
          'a': 
            'type': 'number'
            'description': 'The first number to multiply'
          'b':
            'type': 'number'
            'description': 'The second number to multiply'
tools:
  answering_question:
      'type': function,
      'function':
        'name': 'answering_question'
        'description': | 
                      Busca por dados no banco de dados brasileiro, responde perguntas referentes a saúde, criminalidade, programas sociais...
                      DEVE ser usado SOMENTE se o usuário disser algo como: 
                      "Quero dados sobre ...", "Quero indices de ...", "Quero a quantidade de ..."
        'parameters':
          'type': 'object'
          'required': ['query']
          'properties': 
            'query': 
              'type': 'string'
              'description': 'Assunto requisitado pelo usuário'

  search_resources:
    'type': function,
    'function':
      'name': 'search_resources'
      'description': |
                      Busca por datasets/recursos sobre temas diversos (saúde, educação, crimes...) no banco de dados do governo federal com base na query do usuário
                      DEVE ser usado SOMENTE se o usuário disser algo como: "Quero datasets/recursos sobre ..."
      'parameters':
        'type': 'object'
        'required': ['query']
        'properties': 
          'query': 
            'type': 'string'
            'description': 'Assunto requisitado pelo usuário'

  tabular_query:
    'type': function,
    'function':
      'name': 'tabular_query'
      'description': 'Responde perguntas sobre dados em formato de tabelas como CSV, XLSX, XML... 
                      e bancos de dados relacionais (SQL), deve ser utilizado quando o usuário fizer queries
                      do tipo: "Quero a quantidade de ...", "Quero o indice de ...", "Os nomes de ..."'
      'parameters':
        'type': 'object'
        'required': ['query']
        'properties': 
          'query': 
            'type': 'string'
            'description': 'Pergunta do usuário sobre a tabela'